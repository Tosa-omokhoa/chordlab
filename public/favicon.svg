<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Dark rounded background -->
  <rect width="32" height="32" rx="7" fill="#1c1c1e"/>

  <!-- Three white piano keys -->
  <rect x="5"  y="6" width="6"  height="20" rx="2" fill="#f0f0f0"/>
  <rect x="13" y="6" width="6"  height="20" rx="2" fill="#f0f0f0"/>
  <rect x="21" y="6" width="6"  height="20" rx="2" fill="#f0f0f0"/>

  <!-- Two purple black keys overlapping the gaps -->
  <rect x="9"  y="6" width="4"  height="12" rx="1.5" fill="#5856d6"/>
  <rect x="17" y="6" width="4"  height="12" rx="1.5" fill="#5856d6"/>
</svg>
